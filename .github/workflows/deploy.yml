name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyD5_kyyiC7dc6wWAfOpEDVzQZpm7n9sGJ0"
          VITE_FIREBASE_AUTH_DOMAIN: "debtcounter-35911.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "debtcounter-35911"
          VITE_FIREBASE_STORAGE_BUCKET: "debtcounter-35911.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "137053056243"
          VITE_FIREBASE_APP_ID: "1:137053056243:web:09ed4fc569dd69fe411b86"
          VITE_FIREBASE_COLLECTION: "brotherDebtTransactions"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
